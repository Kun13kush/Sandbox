version: "3.9"

# Optional compose file — use `make up` for the full platform instead.
# This compose file starts the infrastructure components only.

services:
  nginx:
    image: nginx:alpine
    container_name: sandbox-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:rw
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

